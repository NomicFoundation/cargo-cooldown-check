name: "Bootstrap Hermit Index"

# Temporary workflow to regenerate the hermit search index.
# Delete this file after the index release is updated.

on:
  pull_request:

permissions: {}

jobs:
  bootstrap-index:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: "write"
    steps:
      - name: "Generate and publish index"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          versions=$(gh release list --repo "${{ github.repository }}" \
            --limit 100 --exclude-pre-releases \
            --json tagName --jq '[.[].tagName | ltrimstr("v")] | sort')

          jq -n \
            --argjson versions "$versions" \
            '[{
              Name: "cargo-cooldown-check",
              Versions: $versions,
              Channels: ["@latest"],
              CurrentVersion: "",
              Description: "Checks that all Cargo dependencies have been published for a minimum cooldown period",
              Repository: "https://github.com/NomicFoundation/cargo-cooldown-check"
            }]' > index.json

          echo "Generated index.json:"
          cat index.json

          gh release delete index --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create index index.json \
            --repo "${{ github.repository }}" \
            --title "Hermit Package Index" \
            --notes "Auto-generated hermit search index for Renovate. Do not delete." \
            --latest=false
