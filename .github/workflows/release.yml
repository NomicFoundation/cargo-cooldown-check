name: "Release"

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: ["main"]

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'push'
      || contains(github.event.pull_request.labels.*.name, 'ci:release')
    permissions:
      contents: "read"
    strategy:
      matrix:
        include:
          - target: "x86_64-unknown-linux-gnu"
            os: "ubuntu-24.04"
          - target: "aarch64-unknown-linux-gnu"
            os: "ubuntu-24.04"
          - target: "x86_64-apple-darwin"
            os: "macos-latest"
          - target: "aarch64-apple-darwin"
            os: "macos-latest"
          - target: "x86_64-pc-windows-msvc"
            os: "windows-latest"
    runs-on: "${{ matrix.os }}"
    defaults:
      run:
        shell: "bash"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          persist-credentials: false
      - name: "Setup Rust"
        uses: "actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7" # v1.16.0
        with:
          target: "${{ matrix.target }}"
      - name: "Install cross-compilation tools"
        if: "matrix.target == 'aarch64-unknown-linux-gnu'"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: "Build"
        run: "cargo build --release --locked --target ${{ matrix.target }}"
      - name: "Get version"
        id: "version"
        run: |
          version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "version=v${version}" >> "$GITHUB_OUTPUT"
      - name: "Package binary"
        run: |
          cd target/${{ matrix.target }}/release
          bin="cargo-cooldown-check"
          [ -f "${bin}.exe" ] && bin="${bin}.exe"
          tar czf ../../../cargo-cooldown-check-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz "$bin"
      - name: "Upload artifact"
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: "cargo-cooldown-check-${{ matrix.target }}"
          path: "*.tar.gz"

  review:
    needs: "build"
    permissions: {}
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Download artifacts"
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          merge-multiple: true
      - name: "Verify artifacts"
        run: |
          echo "Expected 5 tarballs:"
          ls -la *.tar.gz
          count=$(ls *.tar.gz | wc -l)
          if [ "$count" -ne 5 ]; then
            echo "::error::Expected 5 artifacts, found $count"
            exit 1
          fi
          for f in *.tar.gz; do
            echo "--- $f ---"
            tar tzf "$f"
          done

  check-version:
    if: "github.ref == 'refs/heads/main'"
    needs: "review"
    runs-on: "ubuntu-24.04"
    permissions:
      contents: "read"
    outputs:
      new: "${{ steps.version.outputs.new }}"
      tag: "${{ steps.version.outputs.tag }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          fetch-tags: true
          persist-credentials: false
      - name: "Check for new version"
        id: "version"
        run: |
          version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git tag -l "$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists — skipping release"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $tag"
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    if: "needs.check-version.outputs.new == 'true'"
    needs: "check-version"
    runs-on: "ubuntu-24.04"
    environment: "release"
    permissions:
      contents: "write"
    steps:
      - name: "Download artifacts"
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          merge-multiple: true
      - name: "Create release"
        uses: "softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda" # v2
        with:
          tag_name: "${{ needs.check-version.outputs.tag }}"
          files: "*.tar.gz"
          generate_release_notes: true
      - name: "Update hermit search index"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          # Regenerate the hermit search index so Renovate (and other
          # consumers using this repo as a custom hermit source) can
          # discover available versions.
          versions=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
            --jq '[.[] | select(.prerelease | not) | select(.draft | not) | .tag_name | select(startswith("v")) | ltrimstr("v")] | sort_by(split(".") | map(tonumber))')

          # Format must match `hermit search --json` output (same schema
          # as cashapp/hermit-packages index release).
          current=$(echo "$versions" | jq -r '.[-1]')

          jq -n \
            --argjson versions "$versions" \
            --arg current "$current" \
            '[{
              Name: "cargo-cooldown-check",
              Versions: $versions,
              Channels: ["@latest"],
              CurrentVersion: $current,
              Description: "Checks that all Cargo dependencies have been published for a minimum cooldown period",
              Repository: "https://github.com/NomicFoundation/cargo-cooldown-check"
            }]' > index.json

          echo "Generated index.json:"
          cat index.json

          # Create the index release if it doesn't exist yet, then
          # replace the asset in-place to avoid a window where the
          # release is missing.
          if ! gh release view index > /dev/null 2>&1; then
            gh release create index \
              --title "Hermit Package Index" \
              --notes "Auto-generated hermit search index for Renovate. Do not delete." \
              --latest=false
          fi

          gh release upload index index.json --clobber
