name: "Release"

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: "write"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "x86_64-unknown-linux-gnu"
            os: "ubuntu-24.04"
          - target: "aarch64-unknown-linux-gnu"
            os: "ubuntu-24.04"
          - target: "x86_64-apple-darwin"
            os: "macos-latest"
          - target: "aarch64-apple-darwin"
            os: "macos-latest"
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683" # v4.2.2
        with:
          persist-credentials: false
      - name: "Setup Rust"
        uses: "actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c" # v1.15.2
        with:
          target: "${{ matrix.target }}"
      - name: "Install cross-compilation tools"
        if: "matrix.target == 'aarch64-unknown-linux-gnu'"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: "Build"
        run: "cargo build --release --locked --target ${{ matrix.target }}"
      - name: "Get version"
        id: "version"
        run: |
          version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "version=v${version}" >> "$GITHUB_OUTPUT"
      - name: "Package binary"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cargo-cooldown-check-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz cargo-cooldown-check
      - name: "Upload artifact"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4
        with:
          name: "cargo-cooldown-check-${{ matrix.target }}"
          path: "*.tar.gz"

  review:
    needs: "build"
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Download artifacts"
        uses: "actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093" # v4
        with:
          merge-multiple: true
      - name: "Verify artifacts"
        run: |
          echo "Expected 4 tarballs:"
          ls -la *.tar.gz
          count=$(ls *.tar.gz | wc -l)
          if [ "$count" -ne 4 ]; then
            echo "::error::Expected 4 artifacts, found $count"
            exit 1
          fi
          for f in *.tar.gz; do
            echo "--- $f ---"
            tar tzf "$f"
          done

  release:
    if: "startsWith(github.ref, 'refs/tags/v')"
    needs: "review"
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Download artifacts"
        uses: "actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093" # v4
        with:
          merge-multiple: true
      - name: "Create release"
        uses: "softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe" # v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
