name: "Release"

on:
  pull_request: {}
  push:
    branches: ["main"]

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'push'
      || contains(github.event.pull_request.labels.*.name, 'ci:release')
    permissions:
      contents: "read"
    strategy:
      matrix:
        include:
          - target: "x86_64-unknown-linux-gnu"
            os: "ubuntu-24.04"
          - target: "aarch64-unknown-linux-gnu"
            os: "ubuntu-24.04"
          - target: "x86_64-apple-darwin"
            os: "macos-latest"
          - target: "aarch64-apple-darwin"
            os: "macos-latest"
          - target: "x86_64-pc-windows-msvc"
            os: "windows-latest"
    runs-on: "${{ matrix.os }}"
    defaults:
      run:
        shell: "bash"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          persist-credentials: false
      - name: "Setup Rust"
        uses: "actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c" # v1.15.2
        with:
          target: "${{ matrix.target }}"
      - name: "Install cross-compilation tools"
        if: "matrix.target == 'aarch64-unknown-linux-gnu'"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: "Build"
        run: "cargo build --release --locked --target ${{ matrix.target }}"
      - name: "Get version"
        id: "version"
        run: |
          version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "version=v${version}" >> "$GITHUB_OUTPUT"
      - name: "Package binary"
        run: |
          cd target/${{ matrix.target }}/release
          bin="cargo-cooldown-check"
          [ -f "${bin}.exe" ] && bin="${bin}.exe"
          tar czf ../../../cargo-cooldown-check-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz "$bin"
      - name: "Upload artifact"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4
        with:
          name: "cargo-cooldown-check-${{ matrix.target }}"
          path: "*.tar.gz"

  review:
    needs: "build"
    permissions: {}
    runs-on: "ubuntu-24.04"
    steps:
      - name: "Download artifacts"
        uses: "actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093" # v4
        with:
          merge-multiple: true
      - name: "Verify artifacts"
        run: |
          echo "Expected 5 tarballs:"
          ls -la *.tar.gz
          count=$(ls *.tar.gz | wc -l)
          if [ "$count" -ne 5 ]; then
            echo "::error::Expected 5 artifacts, found $count"
            exit 1
          fi
          for f in *.tar.gz; do
            echo "--- $f ---"
            tar tzf "$f"
          done

  publish:
    if: "github.ref == 'refs/heads/main'"
    needs: "review"
    runs-on: "ubuntu-24.04"
    environment: "release"
    permissions:
      contents: "write"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          fetch-tags: true
          persist-credentials: false
      - name: "Check for new version"
        id: "version"
        run: |
          version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git tag -l "$tag" | grep -q "$tag"; then
            echo "Tag $tag already exists — skipping release"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $tag"
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi
      - name: "Download artifacts"
        if: "steps.version.outputs.new == 'true'"
        uses: "actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093" # v4
        with:
          merge-multiple: true
      - name: "Create release"
        if: "steps.version.outputs.new == 'true'"
        uses: "softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe" # v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          files: "*.tar.gz"
          generate_release_notes: true
